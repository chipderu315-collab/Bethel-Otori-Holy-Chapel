<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牧師論 総合理解テスト 30</title>
    <style>
        :root {
            --pastor-blue: #1a5276; /* 権威と信頼 */
            --pastor-light: #ebf5fb;
            --pastor-accent: #f39c12; /* 召命の輝き */
            --correct: #27ae60;
            --wrong: #e74c3c;
            --text-main: #2c3e50;
        }

        body {
            font-family: 'Hiragino Mincho ProN', 'serif';
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-card {
            width: 100%;
            max-width: 850px;
            background: #ffffff;
            padding: 45px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid var(--pastor-blue);
        }

        .header {
            border-bottom: 2px solid var(--pastor-light);
            margin-bottom: 30px;
            padding-bottom: 15px;
            text-align: center;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        .progress-track {
            width: 100%;
            height: 5px;
            background: #eee;
            margin-bottom: 35px;
        }
        .progress-fill {
            height: 100%;
            background: var(--pastor-blue);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-box {
            font-size: 1.25rem;
            line-height: 1.7;
            color: var(--text-main);
            margin-bottom: 35px;
            font-weight: bold;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .btn-opt {
            padding: 18px 25px;
            border: 1px solid #dcdde1;
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1.05rem;
            text-align: left;
            transition: all 0.2s;
        }

        .btn-opt:hover:not(:disabled) {
            background-color: var(--pastor-light);
            border-color: var(--pastor-blue);
        }

        .commentary {
            margin-top: 30px;
            padding: 20px;
            background: var(--pastor-light);
            border-left: 5px solid var(--pastor-blue);
            display: none;
            line-height: 1.6;
        }

        .btn-next {
            margin-top: 30px;
            width: 100%;
            padding: 18px;
            background: var(--pastor-blue);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
        }

        #result-view { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="quiz-view">
        <div class="header">
            <h2 style="margin:0; color: var(--pastor-blue);">Pastoral Theology Test</h2>
        </div>
        <div class="info-row">
            <span>牧師論：召命と働き</span>
            <span id="q-num">1 / 30</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="fill"></div></div>

        <div class="question-box" id="q-txt">Loading...</div>
        <div class="options-grid" id="opt-grid"></div>
        <div id="comm" class="commentary"></div>
        <button class="btn-next" id="btn-next" onclick="next()">次の課題へ進む</button>
    </div>

    <div id="result-view">
        <h2 style="color: var(--pastor-blue);">牧師論 課程修了</h2>
        <p>「あなたは、自分自身と教えとに気をつけなさい。それらを忠実に守りなさい。」</p>
        <div style="font-size: 4.5rem; margin: 30px 0; color: var(--pastor-accent);" id="final-score">0 / 30</div>
        <button class="btn-next" style="display:inline-block; width: auto; padding: 15px 60px;" onclick="location.reload()">最初から学び直す</button>
    </div>
</div>

<script>
    const pastorData = [
        {
            q: "牧師が神から特定の奉仕へと招かれることを指す神学用語は何ですか？",
            opts: [
                { t: "召命（コーリング）", c: true, r: "神からの直接的、または教会を通じた内的な招きを指します。牧師職の出発点です。" },
                { t: "任命", c: false, r: "任命は人間や組織による手続きを指しますが、神からの招きは召命と言います。" },
                { t: "献身", c: false, r: "献身は本人が身をささげる応答を指し、招きそのものは召命です。" }
            ]
        },
        {
            q: "新約聖書で長老や監督の資格として挙げられている中で、特に『教える能力』以外に重視されているのは何ですか？",
            opts: [
                { t: "家庭をよく治めていること", c: true, r: "テモテへの手紙第一3章等。自分の家庭を治められない者に、神の教会を世話することはできないとされています。" },
                { t: "高い学歴", c: false, r: "聖書は学歴よりも、品性や家庭での証しを重視しています。" },
                { t: "弁論術の卓越性", c: false, r: "技術的な巧みさよりも、非難される所がない品性が求められます。" }
            ]
        },
        {
            q: "牧師の働きにおいて、病める者や悩む者を個別に訪問し、霊的なケアを行う働きを何と呼びますか？",
            opts: [
                { t: "個人牧会（パストラル・ケア）", c: true, r: "群れの一人ひとりの必要に応じる、羊飼いとしての核心的な務めです。" },
                { t: "教会管理", c: false, r: "管理は組織の運営や事務的な働きを指します。" },
                { t: "釈義", c: false, r: "釈義は聖書本文を正しく解釈する学問的な作業を指します。" }
            ]
        }
    ];

    // 30問までのサンプル補充
    for(let i=3; i<30; i++) {
        pastorData.push({
            q: `牧師論 問${i+1}: 牧師の生活、倫理、または礼拝執行について。`,
            opts: [
                { t: "聖書的・教理的に適切な選択肢", c: true, r: "牧師はキリストの僕として、謙卑と誠実をもって群れに仕えることが求められます。" },
                { t: "不適切な考え A", c: false, r: "それは牧師の権威を誤解しているか、世俗的な価値観に近いものです。" },
                { t: "不適切な考え B", c: false, r: "聖書の教えに基づいたバランスの良い理解が必要です。" }
            ]
        });
    }

    let curr = 0;
    let score = 0;

    function render() {
        const d = pastorData[curr];
        document.getElementById('q-num').innerText = `${curr + 1} / 30`;
        document.getElementById('fill').style.width = ((curr + 1) / 30 * 100) + '%';
        document.getElementById('q-txt').innerText = d.q;
        const grid = document.getElementById('opt-grid');
        grid.innerHTML = '';
        d.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = o.t;
            b.onclick = () => check(i);
            grid.appendChild(b);
        });
        document.getElementById('comm').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
    }

    function check(idx) {
        const d = pastorData[curr];
        const isC = d.opts[idx].c;
        if(isC) score++;
        const c = document.getElementById('comm');
        c.style.display = 'block';
        c.style.borderLeftColor = isC ? 'var(--correct)' : 'var(--wrong)';
        c.innerHTML = `<strong>${isC ? '【正解】' : '【解説】'}</strong><br>${d.opts[idx].r}`;
        document.querySelectorAll('.btn-opt').forEach(b => b.disabled = true);
        document.getElementById('btn-next').style.display = 'block';
    }

    function next() {
        curr++;
        if(curr < pastorData.length) render();
        else {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / 30`;
        }
    }

    render();
</script>
</body>
</html>
