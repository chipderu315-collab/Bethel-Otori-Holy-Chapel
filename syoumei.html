<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocation & Commitment - 召命と献身の決意</title>
    <style>
        :root {
            --holy-gold: #c5a059;
            --holy-ivory: #fdfaf5;
            --text-gray: #4a4a4a;
            --border-color: #e0d8c3;
        }

        body {
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            background-color: #f4f1ea;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            color: var(--text-gray);
        }

        .vocation-container {
            width: 100%;
            max-width: 850px;
            background: var(--holy-ivory);
            padding: 60px;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* 装飾的なライン */
        .vocation-container::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid var(--border-color);
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--holy-gold);
            letter-spacing: 0.2rem;
            margin-bottom: 10px;
        }

        .scripture-ref {
            font-style: italic;
            font-size: 1rem;
            color: #888;
        }

        .section-box {
            margin-bottom: 40px;
            position: relative;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--holy-gold);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 1.1rem;
            line-height: 1.8;
            resize: none;
            box-sizing: border-box;
            border-left: 2px solid var(--holy-gold);
            outline: none;
        }

        textarea:focus {
            background: rgba(197, 160, 89, 0.05);
        }

        .instruction {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
        }

        .btn-area {
            text-align: center;
            margin-top: 50px;
        }

        .btn-print {
            background: var(--holy-gold);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 0;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.1rem;
            transition: 0.3s;
        }

        .btn-print:hover {
            background: #af8b46;
        }

        @media print {
            .btn-area, .instruction { display: none; }
            body { background: white; padding: 0; }
            .vocation-container { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="vocation-container">
    <header>
        <h1>召命と献身の記</h1>
        <p class="scripture-ref">「わたしがここに居ります。わたしを遣わしてください。」（イザヤ 6:8）</p>
    </header>

    <div class="section-box">
        <label>1. 与えられた召命の御言葉</label>
        <p class="instruction">あなたの心に深く刻まれている、主からの呼びかけの言葉を記してください。</p>
        <textarea rows="4" placeholder="（例：マタイ 28:19-20 など、あなたにとっての特別な聖句）"></textarea>
    </div>

    <div class="section-box">
        <label>2. 主イエス様への仕え方</label>
        <p class="instruction">現在、あるいは近い将来、どのような形（賜物）を用いて主に仕えたいですか？</p>
        <textarea rows="6" placeholder="（例：奏楽、宣教、教会の管理、病床の見舞いなど）"></textarea>
    </div>

    <div class="section-box">
        <label>3. 今後の希望・祈りの課題</label>
        <p class="instruction">主と共に歩むこれからの人生において、願っていることや祈りを記してください。</p>
        <textarea rows="6" placeholder="（例：未信者の家族の救い、神学校への導き、地域伝道への情熱など）"></textarea>
    </div>

    <div class="btn-area">
        <p class="instruction" style="margin-bottom: 20px;">この決意を印刷して、聖書に挟んだり、机の前に貼っておくことができます。</p>
        <button class="btn-print" onclick="window.print()">この内容を印刷・保存する</button>
    </div>
</div>

</body>
</html>
