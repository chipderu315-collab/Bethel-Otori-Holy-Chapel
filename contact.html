<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ・合格証明書申請 | 教師・献身者養成プログラム</title>
    <style>
        /* --- 1. 基本設定 --- */
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: "UD新ゴ", "UD Shin Go", "Hiragino Sans", sans-serif;
            background-color: #fffaf0; /* パステルベージュ背景 */
            color: #444;
            line-height: 1.8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 2. フォームの外枠 --- */
        .contact-container {
            width: 95%;
            max-width: 600px;
            background: #ffffff;
            padding: 40px;
            margin: 40px 0;
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(212, 163, 115, 0.1);
            border: 2px solid #fefae0;
        }

        .header-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .header-area h2 {
            color: #d4a373;
            margin: 0;
            font-size: 1.5rem;
        }
        .header-area p {
            font-size: 0.85rem;
            color: #8b5e3c;
            margin-top: 10px;
        }

        /* --- 3. 入力項目 --- */
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #8b5e3c;
        }
        .required {
            background: #ffafcc; /* パステルピンク */
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #fefae0;
            border-radius: 12px;
            font-size: 1rem;
            background: #fff;
            color: #444;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #d4a373;
            background: #fffdfb;
            box-shadow: 0 0 8px rgba(212, 163, 115, 0.2);
        }

        /* --- 4. 送信ボタン --- */
        .submit-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #d4a373;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(212, 163, 115, 0.3);
            margin-top: 10px;
        }
        .submit-btn:hover {
            background: #8b5e3c;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 163, 115, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: #999;
            font-size: 0.85rem;
        }
        .back-link:hover {
            color: #d4a373;
            text-decoration: underline;
        }

        /* --- 5. レスポンシブ --- */
        @media (max-width: 480px) {
            .contact-container {
                padding: 25px;
            }
            .header-area h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="header-area">
            <h2>Contact & Apply</h2>
            <p>合格証明書の郵送依頼・お問い合わせ</p>
        </div>

        <form action="#" method="post">
            <div class="form-group">
                <label for="name">お名前<span class="required">必須</span></label>
                <input type="text" id="name" name="name" placeholder="例：田中  太郎" required>
            </div>
            <div class="form-group">
                <label for="tel">お電話番号<span class="required">必須</span></label>
                <input type="tel" id="tel" name="tel" placeholder="例：090-1234-5678" required>
            </div>

            <div class="form-group">
                <label for="zip">郵便番号<span class="required">必須</span></label>
                <input type="text" id="zip" name="zip" placeholder="例：593-8324" required>
            </div>

            <div class="form-group">
                <label for="address">ご住所<span class="required">必須</span></label>
                <textarea id="address" name="address" rows="3" placeholder="例：大阪府堺市西区鳳東町..." required></textarea>
            </div>

            <div class="form-group">
                <label for="type">お問い合わせ内容</label>
                <select id="type" name="type">
                    <option value="cert">合格証明書の郵送希望</option>
                    <option value="question">内容に関する質問</option>
                    <option value="other">その他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">メッセージ（任意）</label>
                <textarea id="message" name="message" rows="4" placeholder="学びの感想やご質問があればお書きください。"></textarea>
            </div>

            <button type="submit" class="submit-btn">この内容で送信する ✨</button>
        </form>
        <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px dashed #fefae0;">
    <p style="font-size: 0.85rem; color: #8b5e3c; margin-bottom: 15px;">
        フォームの入力が大変な方は、<br>インスタのDMからでもOKです！✨
    </p>
    
    <a href="https://www.instagram.com/direct/inbox/" 
       target="_blank" 
       style="display: inline-flex; align-items: center; gap: 10px; background: #fff; border: 2px solid #ffafcc; color: #ffafcc; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s;">
        <span style="font-size: 1.2rem;">📸</span> Instagramで連絡する
    </a>
    
    <p style="font-size: 0.75rem; color: #999; margin-top: 10px;">
        ※「beteru_otori_chapel」宛にメッセージを送ってくださいね。
    </p>
    </div>

        <a href="step 5.html" class="back-link">← ロードマップへ戻る</a>
    </div>

</body>
</html>
