<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Testimony - 救いの証し 作文コーナー</title>
    <style>
        :root {
            --testimony-blue: #2980b9;
            --testimony-light: #e8f4f8;
            --testimony-dark: #34495e;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            background-color: var(--bg-color);
            color: var(--testimony-dark);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .editor-container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--testimony-blue);
            margin-bottom: 40px;
            padding-bottom: 20px;
        }

        h1 { margin: 0; color: var(--testimony-blue); font-size: 2rem; }
        p.subtitle { color: #7f8c8d; margin-top: 10px; }

        .guide-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .guide-card {
            background: var(--testimony-light);
            padding: 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            border-top: 4px solid var(--testimony-blue);
        }

        .guide-card h3 { margin-top: 0; color: var(--testimony-blue); font-size: 1rem; }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--testimony-blue);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1.1rem;
            margin-bottom: 30px;
            background-color: #fdfdfd;
        }

        textarea {
            height: 400px;
            line-height: 1.8;
            resize: vertical;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
        }

        .word-count { color: #7f8c8d; font-size: 0.9rem; }

        .btn-group { display: flex; gap: 10px; }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-save { background: var(--testimony-blue); color: white; }
        .btn-save:hover { background: #21618c; }
        .btn-clear { background: #ecf0f1; color: #7f8c8d; }

        @media (max-width: 768px) {
            .guide-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="editor-container">
    <header>
        <h1>救いの証し 作文コーナー</h1>
        <p class="subtitle">あなたの中に働かれた神様の素晴らしいストーリーを綴りましょう</p>
    </header>

    <div class="guide-grid">
        <div class="guide-card">
            <h3>1. 以前の自分</h3>
            <p>イエス様に出会う前、どのような悩みや空虚さがありましたか？（罪・恐れ・孤独など）</p>
        </div>
        <div class="guide-card">
            <h3>2. 出会い</h3>
            <p>どのようにして福音を聞きましたか？救いを確信したきっかけは何でしたか？</p>
        </div>
        <div class="guide-card">
            <h3>3. 現在の自分</h3>
            <p>イエス様を信じて、何が変わりましたか？今の希望や平安について書いてください。</p>
        </div>
    </div>

    <form id="testimony-form">
        <label for="title">タイトル（例：どん底で出会った真の光）</label>
        <input type="text" id="title" placeholder="証しのタイトルを入力...">

        <label for="content">証しの本文</label>
        <textarea id="content" placeholder="ここから書き始めてください..."></textarea>

        <div class="toolbar">
            <div class="word-count">文字数: <span id="char-count">0</span> 文字</div>
            <div class="btn-group">
                <button type="button" class="btn-clear" onclick="clearAll()">リセット</button>
                <button type="button" class="btn-save" onclick="saveToTxt()">テキストとして保存</button>
            </div>
        </div>
    </form>
</div>

<script>
    const contentArea = document.getElementById('content');
    const charCount = document.getElementById('char-count');

    // 文字数カウント
    contentArea.addEventListener('input', () => {
        charCount.innerText = contentArea.value.length;
    });

    // テキストファイルとして保存
    function saveToTxt() {
        const title = document.getElementById('title').value || "My_Testimony";
        const content = contentArea.value;
        const text = `【タイトル】\n${title}\n\n【本文】\n${content}`;
        
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${title}.txt`;
        a.click();
    }

    // リセット機能
    function clearAll() {
        if (confirm("入力した内容をすべて消去しますか？")) {
            document.getElementById('testimony-form').reset();
            charCount.innerText = "0";
        }
    }
</script>
</body>
</html>
