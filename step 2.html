<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベテル鳳キッズ！ | きゃっきゃ・あそびページ</title>
    <style>
        /* キッズ向け：カラフル＆ポップなベース */
        body {
            background-color: #fffde6; /* 優しい黄色 */
            font-family: "Rounded Mplus 1c", "Hiragino Sans", sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* 横スクロールを防止 */
        }

        /* ふわふわ浮かぶ、神様の雲 */
        .cloud-container {
            position: relative;
            height: 100vh; /* 画面いっぱいに広げる */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            box-shadow: 0 10px 0 #ffe082;
            border: 5px solid #ffb74d;
            padding: 20px 40px;
            transition: transform 0.3s ease;
        }

        /* クリックした時の「ぼよん！」という動き */
        .cloud:active {
            transform: scale(1.2) rotate(5deg);
        }

        /* 飛び出すキラキラ（鳩と虹） */
        .kirakira {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            animation: popOut 1s ease-out forwards;
        }

        @keyframes popOut {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(1); opacity: 0; }
        }

        /* 晋三さんの美味しいごはん・ボタン */
        .shinzo-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff7043;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #d84315;
            cursor: pointer;
        }

        .shinzo-btn:active {
            box-shadow: none;
            transform: translateY(5px);
        }
    </style>
</head>
<body>

    <div class="cloud-container" onclick="popKirakira(event)">
        <div class="cloud" style="top: 30%; left: 50%; transform: translate(-50%, -50%);">
            <h1 style="color: #f57c00; font-size: 2.5rem; margin: 0;">かみさまからのプレゼント</h1>
            <p style="color: #5d4037; font-size: 1rem; margin-top: 10px;">（ここを ぽちっと してね！）</p>
        </div>

        </div>

    <button class="shinzo-btn" onclick="playGohanSound()">晋三さんの<br>おやつタイム！</button>

    <script>
        // キラキラ（鳩と虹）をポップさせる関数
        function popKirakira(event) {
            const container = event.currentTarget;
            const icons = ['🕊️', '🌈', '✨', '💖', 'ハレルヤ！'];

            for (let i = 0; i < 5; i++) {
                const span = document.createElement('span');
                span.classList.add('kirakira');
                span.innerText = icons[Math.floor(Math.random() * icons.length)];

                // 飛び出す方向をランダムに設定
                const dx = (Math.random() - 0.5) * 400 + 'px';
                const dy = (Math.random() - 0.5) * 400 + 'px';
                span.style.setProperty('--dx', dx);
                span.style.setProperty('--dy', dy);

                // クリック位置から生成
                span.style.left = event.clientX + 'px';
                span.style.top = event.clientY + 'px';

                container.appendChild(span);

                // 1秒後に削除
                setTimeout(() => span.remove(), 1000);
            }
            
            // ポップな効果音を鳴らす（実際には音源が必要）
            playPopSound();
        }

        // 音声を再生する関数（音源は別途用意）
        function playPopSound() {
            // 例：const audio = new Audio('pop.mp3'); audio.play();
            console.log('（ぽんっ！という音）');
        }

        function playGohanSound() {
            // 例：const audio = new Audio('gohan.mp3'); audio.play();
            alert('林 晋三さんの、おいしいおやつが できたよ！みんなあつまれー！');
            console.log('（ごはんの鐘の音）');
        }
    </script>
</body>
</html>
