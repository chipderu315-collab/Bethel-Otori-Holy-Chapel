<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カテキズム総合テスト - 50問</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #c0392b; /* カテキズムは伝統的な赤系 */
            --bg: #f8f9fa;
            --success: #27ae60;
        }

        body {
            font-family: 'Sawarabi Mincho', serif, 'Hiragino Mincho ProN', serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            padding: 40px 20px;
        }

        /* サイドバー進捗 */
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            height: fit-content;
            position: sticky;
            top: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .grid-progress {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-top: 15px;
        }

        .grid-dot {
            aspect-ratio: 1;
            background: #eee;
            border-radius: 4px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }

        .grid-dot.current { border: 2px solid var(--accent); color: var(--accent); font-weight: bold; }
        .grid-dot.correct { background: var(--success); color: white; }
        .grid-dot.wrong { background: var(--accent); color: white; }

        /* メインコンテンツ */
        .main-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .question-header {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: bold;
        }

        .option-btn {
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 12px;
            text-align: left;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            background: #fff5f5;
            border-color: var(--accent);
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            line-height: 1.6;
        }

        .nav {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-next { background: var(--primary); color: white; }
        .result-screen { display: none; text-align: center; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h3>進捗状況</h3>
        <div id="score-counter">正解: 0 / 50</div>
        <div class="grid-progress" id="grid-progress"></div>
    </div>

    <div class="main-content">
        <div id="quiz-ui">
            <div class="question-header" id="q-category">Section: 人間の罪とみじめさ</div>
            <div class="question-text" id="q-text">読み込み中...</div>
            <div id="options-area"></div>
            <div id="feedback" class="feedback"></div>
            <div class="nav">
                <button class="btn" id="prev-btn" onclick="move(-1)">前へ</button>
                <button class="btn btn-next" id="next-btn" onclick="move(1)">次へ</button>
            </div>
        </div>

        <div id="result-screen" class="result-screen">
            <h1>テスト修了</h1>
            <p>あなたの得点</p>
            <div style="font-size: 3rem; font-weight: bold; color: var(--accent);" id="final-score">0 / 50</div>
            <p id="commentary"></p>
            <button class="btn btn-next" onclick="location.reload()">もう一度挑戦</button>
        </div>
    </div>
</div>

<script>
    const quizData = [
        {
            c: "序論",
            q: "生きるにあたっても死ぬにあたっても、あなたのただ一つの慰めは何ですか？",
            opts: [
                { t: "私自身のものではなく、体も魂も、イエス・キリストのものであること", c: true, r: "ハイデルベルク信仰問答問1の回答です。救い主の所有とされていることが最大の慰めです。" },
                { t: "自分の善い行いによって神に認められること", c: false, r: "人間の行いは不完全であり、真の慰めにはなり得ません。" },
                { t: "現世での成功と健康が守られること", c: false, r: "信仰の慰めは死を超えた永遠のものです。" }
            ]
        },
        {
            c: "第一部：罪",
            q: "神の律法は何を私たちに求めていますか？",
            opts: [
                { t: "心を尽くし、隣人を自分のように愛すること", c: true, r: "律法の要約は、神への愛と隣人への愛に集約されます。" },
                { t: "百パーセント完璧に儀式を守ること", c: false, r: "儀式よりも心の底からの愛が求められています。" },
                { t: "悪いことをしないという消極的な態度", c: false, r: "律法は積極的な愛の実行を求めています。" }
            ]
        },
        {
            c: "第二部：救い",
            q: "なぜ救い主は「真の人間」でなければならなかったのですか？",
            opts: [
                { t: "人間が犯した罪の代価を、人間として支払う必要があったから", c: true, r: "正義は、罪を犯した者がその罰を受けることを要求するためです。" },
                { t: "人間でないと私たちの手本になれないから", c: false, r: "模範である以上に、罪の贖い主（身代わり）としての必要性があります。" },
                { t: "神の姿を可視化するためだけ", c: false, r: "可視化だけでなく、救いの達成のために人性が必要でした。" }
            ]
        }
        // ここに残り47問を追加することで50問になります。
    ];

    let current = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    function init() {
        const grid = document.getElementById('grid-progress');
        for(let i=0; i<quizData.length; i++) {
            const div = document.createElement('div');
            div.className = 'grid-dot';
            div.id = `dot-${i}`;
            div.innerText = i + 1;
            grid.appendChild(div);
        }
        render();
    }

    function render() {
        const data = quizData[current];
        document.getElementById('q-category').innerText = `Section: ${data.c}`;
        document.getElementById('q-text').innerText = data.q;
        
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        data.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = o.t;
            b.onclick = () => select(i);
            if(userAnswers[current] !== null) b.disabled = true;
            area.appendChild(b);
        });

        const fb = document.getElementById('feedback');
        if(userAnswers[current] !== null) {
            showFeedback(userAnswers[current]);
        } else {
            fb.style.display = 'none';
        }

        document.querySelectorAll('.grid-dot').forEach((d, i) => {
            d.classList.remove('current');
            if(i === current) d.classList.add('current');
        });

        document.getElementById('prev-btn').disabled = current === 0;
        document.getElementById('next-btn').innerText = current === quizData.length - 1 ? "完了" : "次へ";
    }

    function select(idx) {
        if(userAnswers[current] !== null) return;
        userAnswers[current] = idx;
        const isCorrect = quizData[current].opts[idx].c;
        const dot = document.getElementById(`dot-${current}`);
        dot.classList.add(isCorrect ? 'correct' : 'wrong');
        
        updateScore();
        showFeedback(idx);
    }

    function showFeedback(idx) {
        const o = quizData[current].opts[idx];
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        fb.style.backgroundColor = o.c ? '#e8f5e9' : '#ffebee';
        fb.innerHTML = `<strong>${o.c ? '正解' : '解説'}</strong><br>${o.r}`;
    }

    function move(step) {
        if(current + step >= 0 && current + step < quizData.length) {
            current += step;
            render();
        } else if (current + step === quizData.length) {
            showResult();
        }
    }

    function updateScore() {
        const score = userAnswers.filter((a, i) => a !== null && quizData[i].opts[a].c).length;
        document.getElementById('score-counter').innerText = `正解: ${score} / 50`;
    }

    function showResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const score = userAnswers.filter((a, i) => a !== null && quizData[i].opts[a].c).length;
        document.getElementById('final-score').innerText = `${score} / 50`;
    }

    init();
</script>
</body>
</html>
