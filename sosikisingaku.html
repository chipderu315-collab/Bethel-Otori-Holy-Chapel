<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組織神学 総合理解テスト</title>
    <style>
        :root {
            --theology-dark: #1a252f;
            --theology-blue: #2980b9;
            --theology-gold: #f39c12;
            --correct: #27ae60;
            --wrong: #c0392b;
            --bg: #ecf0f1;
        }

        body {
            font-family: 'Times New Roman', serif, 'Hiragino Mincho ProN', serif;
            background-color: var(--bg);
            color: var(--theology-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-left: 10px solid var(--theology-blue);
        }

        .header {
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        .q-number { color: var(--theology-blue); font-weight: bold; font-size: 1.1rem; }
        
        .q-text {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .options { display: grid; gap: 12px; }

        .opt-btn {
            padding: 15px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .opt-btn:hover:not(:disabled) {
            background-color: #f7f9fa;
            border-color: var(--theology-blue);
        }

        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .nav-bar {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-next {
            background: var(--theology-blue);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        #result-screen { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-view">
        <div class="header">
            <div class="q-number" id="q-idx">Question 1 / 20</div>
            <div id="q-tag" style="font-size: 0.8rem; color: #7f8c8d;">Systematic Theology</div>
        </div>
        
        <div class="q-text" id="q-text">Loading...</div>
        
        <div class="options" id="opt-container"></div>
        
        <div id="feedback" class="feedback"></div>
        
        <div class="nav-bar">
            <span id="score-live">正解: 0</span>
            <button class="btn-next" id="btn-next" onclick="next()">次の問題へ</button>
        </div>
    </div>

    <div id="result-screen">
        <h1 style="color: var(--theology-blue);">神学課程 修了</h1>
        <p>組織神学の主要な教理についての理解度：</p>
        <div style="font-size: 4rem; margin: 30px 0;" id="final-score">0 / 20</div>
        <button class="btn-next" style="display: inline-block;" onclick="location.reload()">再挑戦する</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "三位一体の教理において、父・子・聖霊が「同一の本質」であることを指す言葉はどれですか？",
            tag: "神論 / 三位一体論",
            opts: [
                { t: "ホモウーシオス", c: true, r: "ニカイア公会議で確立された言葉で、父と子は等しく神の本質を持つことを意味します。" },
                { t: "ホモイウーシオス", c: false, r: "「類似した本質」を意味し、正統信仰とは区別されます。" },
                { t: "ヒュポスタシス", c: false, r: "これは「位格（個別の存在）」を指す言葉です。" }
            ]
        },
        {
            q: "救済論において、神が罪人をキリストの義に基づいて「義である」と宣言する法廷的行為を何と呼びますか？",
            tag: "救済論",
            opts: [
                { t: "義認（称義）", c: true, r: "人間の内面的な変化ではなく、神の前での法的な地位が変えられることを指します。" },
                { t: "聖化", c: false, r: "これは義認の後に続く、実際に聖められていくプロセスを指します。" },
                { t: "栄化", c: false, r: "救いの最終段階であり、完全に罪から解放されることを指します。" }
            ]
        }
        // ここに残り18問のデータを追加
    ];

    let currentIdx = 0;
    let score = 0;

    function render() {
        const data = quizData[currentIdx];
        document.getElementById('q-idx').innerText = `Question ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('q-tag').innerText = data.tag;
        document.getElementById('q-text').innerText = data.q;
        
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        data.opts.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = o.t;
            btn.onclick = () => select(i);
            container.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
    }

    function select(idx) {
        const data = quizData[currentIdx];
        const isCorrect = data.opts[idx].c;
        if(isCorrect) score++;

        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        fb.style.backgroundColor = isCorrect ? '#e8f5e9' : '#fdedec';
        fb.style.border = `1px solid ${isCorrect ? '#27ae60' : '#c0392b'}`;
        fb.innerHTML = `<strong>${isCorrect ? '【正解】' : '【解説】'}</strong><br>${data.opts[idx].r}`;

        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        document.getElementById('score-live').innerText = `正解: ${score}`;
        document.getElementById('btn-next').style.display = 'block';
    }

    function next() {
        currentIdx++;
        if(currentIdx < quizData.length) {
            render();
        } else {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        }
    }

    render();
</script>
</body>
</html>
